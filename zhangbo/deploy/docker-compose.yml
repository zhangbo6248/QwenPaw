name: qwenpaw

services:
  qwenpaw:
    build:
      context: /Users/zhangbo/Developer/code/python/QwenPaw
      dockerfile: zhangbo/deploy/Dockerfile
    image: zhangbo6248/qwenpaw:local
    container_name: qwenpaw
    restart: always
    ports:
      - "127.0.0.1:8088:8088"
    # 加入 Docker 网络（访问 HiCLAW 和 MemOS）
    networks:
      - memos_shared_net
    # 设置 PYTHONPATH，让 Python 优先加载挂载的源码
    environment:
      - PYTHONPATH=/app/projects/code/python/QwenPaw/src:${PYTHONPATH}
      # 指定 console 静态文件路径（因为挂载源码覆盖了 venv 安装的包）
      - QWENPAW_CONSOLE_STATIC_DIR=/app/venv/lib/python3.11/site-packages/qwenpaw/console
    volumes:
      # qwenpaw 数据目录 (统一存放于 /Users/zhangbo/docker/qwenpaw)
      - /Users/zhangbo/docker/qwenpaw/data:/app/working
      - /Users/zhangbo/docker/qwenpaw/secrets:/app/working.secret
      - /Users/zhangbo/docker/qwenpaw/backups:/app/working.backups

      # 所有智能体工作区统一管理 (挂载到 QwenPaw 实际读取路径)
      - /Users/zhangbo/Work/agents/qwenpaw/workspaces:/app/working/workspaces

       #项目目录
      - /Users/zhangbo/Work/zhangbo/trade/code:/app/projects/trade
      - /Users/zhangbo/Developer/code:/app/projects/code
      # 源码挂载（覆盖 pip 安装的 qwenpaw，使用本地修改的代码）
      - /Users/zhangbo/Developer/code/python/QwenPaw:/app/projects/code/python/QwenPaw

      # uv 缓存 - 共享缓存，保留在用户目录
      - ~/.cache/uv:/root/.cache/uv
      - ~/.local/share/uv:/root/.local/share/uv

      # Docker socket - 让 QwenPaw 可以执行宿主机 docker 命令
      - /var/run/docker.sock:/var/run/docker.sock

# Docker 网络配置
networks:
  memos_shared_net:
    external: true


